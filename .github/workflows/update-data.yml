# Полная автоматизация НАСТАРТ Трекера
# 1. Проверяет настарт.рф и Telegram на новые протоколы
# 2. Скачивает PDF с Яндекс.Диска
# 3. Парсит и обновляет data.json
# 4. Коммитит изменения → автоматический деплой на GitHub Pages

name: Автообновление данных

on:
  # Еженедельно по понедельникам в 07:00 UTC (10:00 МСК)
  schedule:
    - cron: '0 7 * * 1'

  # Ручной запуск
  workflow_dispatch:

  # При пуше новых PDF или скриптов
  push:
    paths:
      - 'pdf_protocols/*.pdf'
      - 'scripts/parse_pdfs.py'
      - 'scripts/deduplicate.py'

permissions:
  contents: write

jobs:
  auto-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Проверка новых протоколов
        id: check
        run: |
          python3 scripts/auto_check.py && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Показать результат
        if: always()
        run: |
          if [ -f scripts/update_summary.json ]; then
            echo "=== Результат обновления ==="
            cat scripts/update_summary.json
          else
            echo "Новых протоколов не найдено"
          fi

      - name: Пересборка данных (если добавлены PDF вручную)
        if: steps.check.outputs.changed != 'true' && github.event_name == 'push'
        run: |
          python3 scripts/parse_pdfs.py
          python3 scripts/deduplicate.py

      - name: Статистика data.json
        if: always()
        run: |
          if [ -f data.json ]; then
            python3 -c "
          import json
          d = json.load(open('data.json'))
          total = sum(len(a['results']) for a in d)
          meets = set()
          for a in d:
              for r in a['results']:
                  meets.add(r['meet'])
          print(f'Спортсменов: {len(d)}')
          print(f'Результатов: {total}')
          print(f'Соревнований: {len(meets)}')
          for m in sorted(meets):
              print(f'  - {m}')
          "
          fi

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Добавляем все изменённые файлы
          git add data.json
          git add pdf_protocols/*.pdf 2>/dev/null || true
          git add scripts/parse_pdfs.py
          git add scripts/pdf_parsed_results.json 2>/dev/null || true
          git add scripts/update_summary.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "Нет изменений для коммита"
          else
            # Формируем описание коммита
            if [ -f scripts/update_summary.json ]; then
              MSG=$(python3 -c "
          import json
          s = json.load(open('scripts/update_summary.json'))
          protos = ', '.join(s.get('new_protocols', []))
          print(f'🏊 Автообновление: +{s.get(\"downloaded\", 0)} протоколов ({protos})')
          " 2>/dev/null || echo "🏊 Обновление данных")
            else
              MSG="🏊 Обновление данных: $(date +'%Y-%m-%d')"
            fi
            git commit -m "$MSG"
            git push
          fi
