# Деплой на GitHub Pages при каждом пуше в main
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'style.css'
      - 'app.js'
      - 'data.json'

  # Позволяет запустить вручную
  workflow_dispatch:

# Разрешения для GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Загружаем только файлы сайта (без скриптов и PDF)
          path: '.'
          # Исключение через .pagesignore не поддерживается,
          # поэтому GitHub Pages просто отдаст всё — это ок,
          # PDF доступны через прямые ссылки если нужно

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
